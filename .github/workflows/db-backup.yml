name: 🗄️ Backup D1 Database
on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点自动备份，可按需修改或删除
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Export database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          echo "📦 正在导出数据库: $DB_NAME"
          wrangler d1 export "$DB_NAME" --remote --output ./backup.sql
          echo "✅ 导出完成"
          echo "   大小: $(du -sh backup.sql | cut -f1)"
          echo "   INSERT 语句数: $(strings ./backup.sql | grep -c '^INSERT INTO' || true)"
      - name: Compress backup
        run: |
          gzip -c ./backup.sql > ./backup.sql.gz
          echo "🗜️ 压缩后大小: $(du -sh backup.sql.gz | cut -f1)"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup
          path: ./backup.sql.gz
          retention-days: 30
      - name: Print summary
        run: |
          echo "## ✅ 备份完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "恢复数据时，在 Restore 工作流中填写以下 Run ID：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> artifact 保留 30 天，请尽快完成后续操作。" >> $GITHUB_STEP_SUMMARY
