name: ♻️ Restore D1 Database

on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
      tables:
        description: '要恢复的表（逗号分隔，留空则恢复全部）示例: message,email'
        required: false
        type: string
        default: ''
      batch_size:
        description: '每批导入的语句数（默认50）'
        required: false
        type: string
        default: '50'

permissions:
  actions: read

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份文件大小: $(du -sh backup.sql | cut -f1)"

      - name: Prepare restore files
        env:
          TABLES: ${{ inputs.tables }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          python3 - <<'PYEOF'
          import re
          import os
          import math
          import time

          tables_input = os.environ.get('TABLES', '').strip()
          target_tables = [t.strip().strip('"') for t in tables_input.split(',') if t.strip()] if tables_input else []

          batch_size_raw = os.environ.get('BATCH_SIZE', '50').strip()
          try:
              batch_size = int(batch_size_raw)
              if batch_size <= 0:
                  batch_size = 50
          except Exception:
              batch_size = 50

          # 单条 SQL 最大大小，避免 D1 单条过大
          MAX_STMT_BYTES = 100_000

          with open('./backup.sql', encoding='utf-8', errors='replace') as f:
              content = f.read()

          def split_sql(sql: str):
              """
              更安全地拆分 SQL：
              只在字符串外部的分号处分割。
              支持：
              - 单引号字符串 'abc''def'
              - 双引号标识符 "table"
              - 方括号标识符 [table]
              - 反引号标识符 `table`
              - 行注释 --
              - 块注释 /* */
              """
              statements = []
              buf = []

              in_single = False
              in_double = False
              in_backtick = False
              in_bracket = False
              in_line_comment = False
              in_block_comment = False

              i = 0
              n = len(sql)

              while i < n:
                  ch = sql[i]
                  nxt = sql[i + 1] if i + 1 < n else ''

                  buf.append(ch)

                  if in_line_comment:
                      if ch == '\n':
                          in_line_comment = False
                      i += 1
                      continue

                  if in_block_comment:
                      if ch == '*' and nxt == '/':
                          buf.append(nxt)
                          i += 2
                          in_block_comment = False
                          continue
                      i += 1
                      continue

                  if in_single:
                      if ch == "'":
                          # SQLite 单引号转义：''
                          if nxt == "'":
                              buf.append(nxt)
                              i += 2
                              continue
                          in_single = False
                      i += 1
                      continue

                  if in_double:
                      if ch == '"':
                          # 双引号内部转义：""
                          if nxt == '"':
                              buf.append(nxt)
                              i += 2
                              continue
                          in_double = False
                      i += 1
                      continue

                  if in_backtick:
                      if ch == '`':
                          in_backtick = False
                      i += 1
                      continue

                  if in_bracket:
                      if ch == ']':
                          in_bracket = False
                      i += 1
                      continue

                  # 当前不在字符串或注释中
                  if ch == '-' and nxt == '-':
                      buf.append(nxt)
                      i += 2
                      in_line_comment = True
                      continue

                  if ch == '/' and nxt == '*':
                      buf.append(nxt)
                      i += 2
                      in_block_comment = True
                      continue

                  if ch == "'":
                      in_single = True
                      i += 1
                      continue

                  if ch == '"':
                      in_double = True
                      i += 1
                      continue

                  if ch == '`':
                      in_backtick = True
                      i += 1
                      continue

                  if ch == '[':
                      in_bracket = True
                      i += 1
                      continue

                  if ch == ';':
                      stmt = ''.join(buf).strip()
                      if stmt:
                          statements.append(stmt)
                      buf = []
                      i += 1
                      continue

                  i += 1

              tail = ''.join(buf).strip()
              if tail:
                  statements.append(tail)

              return statements

          raw_statements = split_sql(content)

          all_stmts = []
          counts = {}
          skipped = 0
          fallback_ts = int(time.time() * 1000)

          for stmt in raw_statements:
              stmt = stmt.strip()

              if not stmt:
                  continue

              # 只处理 INSERT
              m = re.match(r'INSERT\s+INTO\s+"?([A-Za-z_][A-Za-z0-9_]*)"?\s', stmt, re.IGNORECASE)
              if not m:
                  continue

              table_name = m.group(1)

              if target_tables and table_name not in target_tables:
                  continue

              if table_name in ('d1_migrations', 'sqlite_sequence', '_cf_KV'):
                  continue

              stmt = re.sub(r'^INSERT\s+INTO', 'INSERT OR REPLACE INTO', stmt, flags=re.IGNORECASE)

              # 针对 message 表补 sent_at
              # 注意：这里保留你原来的逻辑，但只做最小改动
              if table_name == 'message':
                  if '"sent_at"' not in stmt and 'sent_at' not in stmt:
                      stmt = re.sub(r'\)\s*VALUES', ',"sent_at") VALUES', stmt, count=1, flags=re.IGNORECASE)

                      received_at_match = re.search(r',(\d{13})[,)]', stmt)
                      fill_val = received_at_match.group(1) if received_at_match else str(fallback_ts)

                      stmt = re.sub(r'\)\s*;?\s*$', f',{fill_val})', stmt.rstrip())
                  else:
                      received_at_match = re.search(r',(\d{13})[,)]', stmt)
                      fill_val = received_at_match.group(1) if received_at_match else str(fallback_ts)

                      # 只替换 sent_at 为 NULL 的情况比较复杂，这里沿用你的逻辑
                      stmt = re.sub(r'\bNULL\b', fill_val, stmt)

              stmt = stmt.rstrip()
              if not stmt.endswith(';'):
                  stmt += ';'

              if len(stmt.encode('utf-8')) > MAX_STMT_BYTES:
                  skipped += 1
                  continue

              all_stmts.append(stmt + '\n')
              counts[table_name] = counts.get(table_name, 0) + 1

          total = len(all_stmts)
          num_batches = math.ceil(total / batch_size) if total else 0

          os.makedirs('./batches', exist_ok=True)

          for i in range(num_batches):
              chunk = all_stmts[i * batch_size:(i + 1) * batch_size]
              batch_file = f'./batches/batch_{i + 1:04d}.sql'

              with open(batch_file, 'w', encoding='utf-8') as f:
                  f.writelines(chunk)

          print(f"恢复范围: {'全部表' if not target_tables else ', '.join(target_tables)}")

          for t, c in sorted(counts.items()):
              print(f"  {t}: {c} 条")

          print(f"原始 SQL 语句数: {len(raw_statements)}")
          print(f"合计待恢复 INSERT: {total} 条，分 {num_batches} 批（每批 {batch_size} 条）")

          if skipped:
              print(f"⚠️ 跳过超长记录: {skipped} 条")
          PYEOF

      - name: Restore via Cloudflare API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: |
          shopt -s nullglob

          files=(./batches/batch_*.sql)
          TOTAL=${#files[@]}

          if [ "$TOTAL" -eq 0 ]; then
            echo "⚠️ 没有找到需要恢复的 batch 文件，可能没有匹配到要恢复的数据"
            exit 0
          fi

          echo "♻️ 开始恢复，共 $TOTAL 批"

          i=0

          for batch_file in "${files[@]}"; do
            i=$((i + 1))
            echo "📦 正在导入第 $i/$TOTAL 批: $batch_file"
            echo "📄 当前批次大小: $(du -h "$batch_file" | cut -f1)"

            python3 - "$batch_file" > payload.json <<'PYEOF'
          import json
          import sys

          batch_file = sys.argv[1]

          with open(batch_file, "r", encoding="utf-8") as f:
              sql = f.read()

          json.dump({"sql": sql}, sys.stdout, ensure_ascii=False)
          PYEOF

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DATABASE_ID}/query" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @payload.json)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ 第 $i 批失败 (HTTP $HTTP_CODE):"
              echo "$BODY"

              echo ""
              echo "======= 失败 batch 文件前 80 行 ======="
              sed -n '1,80p' "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件后 80 行 ======="
              tail -n 80 "$batch_file" || true

              exit 1
            fi

            SUCCESS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success', False))")

            if [ "$SUCCESS" != "True" ]; then
              echo "❌ 第 $i 批 API 返回失败:"
              echo "$BODY"

              echo ""
              echo "======= 失败 batch 文件前 80 行 ======="
              sed -n '1,80p' "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件后 80 行 ======="
              tail -n 80 "$batch_file" || true

              exit 1
            fi

            echo "✅ 第 $i 批完成"

            rm -f payload.json

            sleep 1
          done

          echo "🎉 全部恢复完成"
