name: ♻️ Restore D1 Database
on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
permissions:
  actions: read
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份总行数: $(wc -l < ./backup.sql) 行"
      - name: Extract and fix message table
        run: |
          python3 - <<'PYEOF'
          import re, uuid

          lines = open('./backup.sql').readlines()
          fixed = [f'-- restore-id: {uuid.uuid4()}\n']
          count = 0

          for line in lines:
              if not re.search(r'INSERT INTO.*message', line, re.IGNORECASE):
                  continue

              # INSERT OR REPLACE
              line = re.sub(r'INSERT INTO', 'INSERT OR REPLACE INTO', line, flags=re.IGNORECASE)

              # 在列名列表里追加 "sent_at"
              # 匹配 ("id","emailId",..."html") 这段列名部分
              line = re.sub(
                  r'("html")\s*\)',
                  r'\1,"sent_at")',
                  line
              )

              # 在 VALUES 里每行末尾的最后一个 ) 前，插入 received_at 的值作为 sent_at
              # received_at 是数字时间戳，sent_at 也用同样的值
              # 先提取 received_at 的值（第6个值）
              m = re.search(r'VALUES\s*\(', line)
              if m:
                  # 用正则从值列表里取 received_at（倒数第2个值，html前）
                  # 结构：VALUES('id','emailId','from','subject',content_expr,received_at,'html_expr')
                  # received_at 是纯数字
                  received_at_match = re.search(r',(\d{13}),', line)
                  if received_at_match:
                      received_at_val = received_at_match.group(1)
                      # 在最后一个 ); 前插入 sent_at 值
                      line = re.sub(r'\);\s*$', f',{received_at_val});', line)

              fixed.append(line)
              count += 1

          open('./restore_target.sql', 'w').writelines(fixed)
          print(f"处理完成，共 {count} 条记录")
          PYEOF

          echo "📄 message 表记录数: $(( $(wc -l < ./restore_target.sql) - 1 )) 行"
          echo "=== 替换后第2条（验证列名和值）==="
          sed -n '2p' ./restore_target.sql | cut -c1-300
      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Restore database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          echo "♻️ 正在恢复 message 表: $DB_NAME"
          wrangler d1 execute "$DB_NAME" --remote --file ./restore_target.sql
          echo "✅ message 表恢复完成"
