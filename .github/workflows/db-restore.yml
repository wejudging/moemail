name: ♻️ Restore D1 Database
on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
permissions:
  actions: read
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份总行数: $(wc -l < ./backup.sql) 行"
      - name: Extract and fix email + message tables
        run: |
          python3 - <<'PYEOF'
          import re, uuid

          content = open('./backup.sql', encoding='utf-8', errors='replace').read()

          # 按语句分割（以 ; 结尾，支持多行语句）
          statements = re.split(r';\s*\n', content)

          fixed = [f'-- restore-id: {uuid.uuid4()}\n']
          email_count = 0
          message_count = 0

          for stmt in statements:
              stmt = stmt.strip()
              if not stmt:
                  continue

              is_email = bool(re.match(r'INSERT INTO\s+"?email"?\s', stmt, re.IGNORECASE))
              is_message = bool(re.match(r'INSERT INTO\s+"?message"?\s', stmt, re.IGNORECASE))

              if not is_email and not is_message:
                  continue

              # INSERT OR REPLACE
              stmt = re.sub(r'^INSERT INTO', 'INSERT OR REPLACE INTO', stmt, flags=re.IGNORECASE)

              if is_message:
                  # 补 sent_at 列（旧备份没有这列）
                  if '"sent_at"' not in stmt:
                      stmt = re.sub(r'("html")\s*\)', r'\1,"sent_at")', stmt)
                      received_at_match = re.search(r',(\d{13}),', stmt)
                      if received_at_match:
                          received_at_val = received_at_match.group(1)
                          stmt = re.sub(r'\)\s*$', f',{received_at_val})', stmt)
                  message_count += 1
              else:
                  email_count += 1

              fixed.append(stmt + ';\n')

          open('./restore_target.sql', 'w', encoding='utf-8').writelines(fixed)
          print(f"email 表: {email_count} 条，message 表: {message_count} 条，共 {email_count + message_count} 条")
          PYEOF

          echo "📄 待恢复语句总数: $(( $(wc -l < ./restore_target.sql) - 1 )) 行"
      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Restore database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          echo "♻️ 正在恢复 email + message 表: $DB_NAME"
          wrangler d1 execute "$DB_NAME" --remote --file ./restore_target.sql
          echo "✅ 恢复完成"
