name: ♻️ Restore D1 Database

on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
      tables:
        description: '要恢复的表（逗号分隔，留空则恢复全部）示例: message,email'
        required: false
        type: string
        default: ''
      batch_size:
        description: '每批导入的语句数（默认20）'
        required: false
        type: string
        default: '20'
      max_batch_bytes:
        description: '每批最大 SQL 大小，单位字节（默认80000）'
        required: false
        type: string
        default: '80000'
      max_stmt_bytes:
        description: '单条 SQL 最大大小，单位字节（默认90000）'
        required: false
        type: string
        default: '90000'
      oversized_action:
        description: '超大记录处理方式：truncate=截断大字段，skip=跳过'
        required: false
        type: string
        default: 'truncate'

permissions:
  actions: read

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份文件大小: $(du -sh backup.sql | cut -f1)"

      - name: Prepare restore files
        env:
          TABLES: ${{ inputs.tables }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          MAX_BATCH_BYTES: ${{ inputs.max_batch_bytes }}
          MAX_STMT_BYTES: ${{ inputs.max_stmt_bytes }}
          OVERSIZED_ACTION: ${{ inputs.oversized_action }}
        run: |
          python3 - <<'PYEOF'
          import os
          import math
          import time
          import sqlite3
          import traceback

          tables_input = os.environ.get('TABLES', '').strip()
          target_tables = [t.strip().strip('"').strip("'") for t in tables_input.split(',') if t.strip()] if tables_input else []

          def parse_int_env(name, default):
              try:
                  v = int(os.environ.get(name, str(default)).strip())
                  if v <= 0:
                      return default
                  return v
              except Exception:
                  return default

          batch_size = parse_int_env('BATCH_SIZE', 20)
          max_batch_bytes = parse_int_env('MAX_BATCH_BYTES', 80000)
          max_stmt_bytes = parse_int_env('MAX_STMT_BYTES', 90000)

          oversized_action = os.environ.get('OVERSIZED_ACTION', 'truncate').strip().lower()
          if oversized_action not in ('truncate', 'skip'):
              oversized_action = 'truncate'

          SKIP_TABLES = {
              'd1_migrations',
              'sqlite_sequence',
              '_cf_KV',
          }

          fallback_ts = int(time.time() * 1000)

          def quote_ident(name: str) -> str:
              return '"' + name.replace('"', '""') + '"'

          def sql_literal(value):
              if value is None:
                  return 'NULL'

              if isinstance(value, bool):
                  return '1' if value else '0'

              if isinstance(value, int):
                  return str(value)

              if isinstance(value, float):
                  if math.isnan(value) or math.isinf(value):
                      return 'NULL'
                  return repr(value)

              if isinstance(value, bytes):
                  return "X'" + value.hex() + "'"

              s = str(value)
              s = s.replace('\x00', '')
              s = s.replace("'", "''")
              return "'" + s + "'"

          def build_insert_stmt(table, columns, values):
              columns_sql = ','.join(quote_ident(c) for c in columns)
              values_sql = ','.join(sql_literal(v) for v in values)
              return f'INSERT OR REPLACE INTO {quote_ident(table)} ({columns_sql}) VALUES({values_sql});\n'

          def truncate_value(v, max_chars, label=''):
              if v is None:
                  return v

              if isinstance(v, bytes):
                  return v[:max_chars]

              s = str(v)
              if len(s) <= max_chars:
                  return v

              suffix = f"\n\n[TRUNCATED BY RESTORE WORKFLOW: {label}, original_chars={len(s)}]"
              keep = max(0, max_chars - len(suffix))
              return s[:keep] + suffix

          def try_shrink_message(table, columns, values):
              """
              针对 message 表的大字段做截断。
              主要是 html 字段过大导致 D1 SQLITE_TOOBIG。
              """
              if table != 'message':
                  return values, False

              values = list(values)
              changed = False

              col_index = {c: i for i, c in enumerate(columns)}

              # 优先截断 html，因为通常最大
              if 'html' in col_index:
                  i = col_index['html']
                  old = values[i]
                  new = truncate_value(old, 30000, 'message.html')
                  if new != old:
                      values[i] = new
                      changed = True

              # 如果 content 也很大，截断
              if 'content' in col_index:
                  i = col_index['content']
                  old = values[i]
                  new = truncate_value(old, 10000, 'message.content')
                  if new != old:
                      values[i] = new
                      changed = True

              # subject 正常不会很大，但保险处理
              if 'subject' in col_index:
                  i = col_index['subject']
                  old = values[i]
                  new = truncate_value(old, 1000, 'message.subject')
                  if new != old:
                      values[i] = new
                      changed = True

              return values, changed

          print("📥 正在把 backup.sql 导入本地临时 SQLite，用于规范化数据...")

          if os.path.exists('./restore.db'):
              os.remove('./restore.db')

          conn = sqlite3.connect('./restore.db')
          conn.execute('PRAGMA foreign_keys = OFF;')

          with open('./backup.sql', 'rb') as f:
              raw = f.read()

          nul_count = raw.count(b'\x00')
          if nul_count:
              print(f"⚠️ 检测到 NUL 空字符: {nul_count} 个，已自动移除")
              raw = raw.replace(b'\x00', b'')

          backup_sql = raw.decode('utf-8', errors='replace')

          try:
              conn.executescript(backup_sql)
              conn.commit()
          except Exception:
              print("❌ backup.sql 无法导入本地 SQLite。")
              print("错误信息：")
              traceback.print_exc()
              raise

          print("✅ 本地 SQLite 导入完成，开始重新生成安全 INSERT SQL...")

          cur = conn.cursor()

          cur.execute("""
              SELECT name
              FROM sqlite_master
              WHERE type='table'
              ORDER BY name
          """)
          existing_tables = [row[0] for row in cur.fetchall()]

          if target_tables:
              restore_tables = [t for t in target_tables if t in existing_tables and t not in SKIP_TABLES]
              missing_tables = [t for t in target_tables if t not in existing_tables]
              if missing_tables:
                  print("⚠️ 以下指定表在备份中不存在，将跳过：", ', '.join(missing_tables))
          else:
              restore_tables = [t for t in existing_tables if t not in SKIP_TABLES]

          os.makedirs('./batches', exist_ok=True)

          all_batches = []
          current_batch = []
          current_count = 0
          current_bytes = 0

          counts = {}
          skipped_large = 0
          truncated_large = 0
          skipped_empty_table = 0

          def flush_batch():
              global current_batch, current_count, current_bytes
              if current_batch:
                  all_batches.append(current_batch[:])
                  current_batch.clear()
                  current_count = 0
                  current_bytes = 0

          for table in restore_tables:
              cur.execute(f'PRAGMA table_info({quote_ident(table)})')
              table_info = cur.fetchall()

              if not table_info:
                  skipped_empty_table += 1
                  continue

              original_columns = [row[1] for row in table_info]
              select_columns = original_columns[:]
              output_columns = original_columns[:]

              message_need_append_sent_at = False
              message_sent_at_index = None
              message_received_at_index = None

              if table == 'message':
                  if 'received_at' in original_columns:
                      message_received_at_index = original_columns.index('received_at')

                  if 'sent_at' in original_columns:
                      message_sent_at_index = original_columns.index('sent_at')
                  else:
                      output_columns.append('sent_at')
                      message_need_append_sent_at = True

              quoted_select_cols = ', '.join(quote_ident(c) for c in select_columns)
              cur.execute(f'SELECT {quoted_select_cols} FROM {quote_ident(table)}')

              row_count = 0

              while True:
                  rows = cur.fetchmany(200)
                  if not rows:
                      break

                  for row in rows:
                      values = list(row)

                      if table == 'message':
                          fill_val = fallback_ts

                          if message_received_at_index is not None:
                              received_at_val = values[message_received_at_index]
                              if received_at_val is not None:
                                  fill_val = received_at_val

                          if message_need_append_sent_at:
                              values.append(fill_val)
                          else:
                              if message_sent_at_index is not None and values[message_sent_at_index] is None:
                                  values[message_sent_at_index] = fill_val

                      stmt = build_insert_stmt(table, output_columns, values)
                      stmt_bytes = len(stmt.encode('utf-8'))

                      if stmt_bytes > max_stmt_bytes:
                          if oversized_action == 'truncate':
                              new_values, changed = try_shrink_message(table, output_columns, values)

                              if changed:
                                  stmt = build_insert_stmt(table, output_columns, new_values)
                                  stmt_bytes = len(stmt.encode('utf-8'))

                                  if stmt_bytes <= max_stmt_bytes:
                                      truncated_large += 1
                                  else:
                                      skipped_large += 1
                                      continue
                              else:
                                  skipped_large += 1
                                  continue
                          else:
                              skipped_large += 1
                              continue

                      # 如果单条 SQL 仍然比批次限制大，单独成批
                      if current_batch and (
                          current_count >= batch_size or
                          current_bytes + stmt_bytes > max_batch_bytes
                      ):
                          flush_batch()

                      current_batch.append(stmt)
                      current_count += 1
                      current_bytes += stmt_bytes

                      # 单条已经接近或超过批大小，立即 flush，避免和下一条合并
                      if current_bytes >= max_batch_bytes:
                          flush_batch()

                      row_count += 1
                      counts[table] = counts.get(table, 0) + 1

              print(f"  {table}: {row_count} 条")

          flush_batch()

          for i, batch in enumerate(all_batches, start=1):
              batch_file = f'./batches/batch_{i:04d}.sql'
              with open(batch_file, 'w', encoding='utf-8') as f:
                  f.writelines(batch)

          total_rows = sum(counts.values())

          print("")
          print(f"恢复范围: {'全部表' if not target_tables else ', '.join(target_tables)}")
          print(f"合计待恢复: {total_rows} 条")
          print(f"分批数量: {len(all_batches)} 批")
          print(f"每批最多语句数: {batch_size}")
          print(f"每批最大字节数: {max_batch_bytes}")
          print(f"单条最大字节数: {max_stmt_bytes}")
          print(f"超大记录处理方式: {oversized_action}")

          if truncated_large:
              print(f"⚠️ 已截断超大记录: {truncated_large} 条")

          if skipped_large:
              print(f"⚠️ 已跳过仍然过大的记录: {skipped_large} 条")

          if skipped_empty_table:
              print(f"⚠️ 跳过空结构表: {skipped_empty_table} 个")

          conn.close()
          PYEOF

      - name: Restore via Cloudflare API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: |
          shopt -s nullglob

          files=(./batches/batch_*.sql)
          TOTAL=${#files[@]}

          if [ "$TOTAL" -eq 0 ]; then
            echo "⚠️ 没有找到需要恢复的 batch 文件，可能没有匹配到要恢复的数据"
            exit 0
          fi

          echo "♻️ 开始恢复，共 $TOTAL 批"

          i=0

          for batch_file in "${files[@]}"; do
            i=$((i + 1))
            echo "📦 正在导入第 $i/$TOTAL 批: $batch_file"
            echo "📄 当前批次大小: $(du -h "$batch_file" | cut -f1)"

            python3 - "$batch_file" > payload.json <<'PYEOF'
          import json
          import sys

          batch_file = sys.argv[1]

          with open(batch_file, "r", encoding="utf-8") as f:
              sql = f.read()

          json.dump({"sql": sql}, sys.stdout, ensure_ascii=False)
          PYEOF

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DATABASE_ID}/query" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @payload.json)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ 第 $i 批失败 (HTTP $HTTP_CODE):"
              echo "$BODY"

              echo ""
              echo "======= 失败 batch 文件大小 ======="
              wc -c "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件前 20 行 ======="
              sed -n '1,20p' "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件后 20 行 ======="
              tail -n 20 "$batch_file" || true

              exit 1
            fi

            SUCCESS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success', False))")

            if [ "$SUCCESS" != "True" ]; then
              echo "❌ 第 $i 批 API 返回失败:"
              echo "$BODY"

              echo ""
              echo "======= 失败 batch 文件大小 ======="
              wc -c "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件前 20 行 ======="
              sed -n '1,20p' "$batch_file" || true

              echo ""
              echo "======= 失败 batch 文件后 20 行 ======="
              tail -n 20 "$batch_file" || true

              exit 1
            fi

            echo "✅ 第 $i 批完成"

            rm -f payload.json

            sleep 1
          done

          echo "🎉 全部恢复完成"
