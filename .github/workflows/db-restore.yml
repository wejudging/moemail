name: ♻️ Restore D1 Database
on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
permissions:
  actions: read
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份总行数: $(wc -l < ./backup.sql) 行"
      - name: Debug - print sample INSERT
        run: |
          echo "=== message 表前3条原始 INSERT ==="
          grep -i 'INSERT INTO.*["`]\?message["`]\?' ./backup.sql | head -3
          echo "=== 含 NULL 的前3条 ==="
          grep -i 'INSERT INTO.*["`]\?message["`]\?' ./backup.sql | grep 'NULL' | head -3
      - name: Extract and fix message table
        run: |
          python3 - <<'PYEOF'
          import re, datetime, uuid

          current_time = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S')
          lines = open('./backup.sql').readlines()
          fixed = [f'-- restore-id: {uuid.uuid4()}\n']
          count = 0
          for line in lines:
              if not re.search(r'INSERT INTO.*message', line, re.IGNORECASE):
                  continue
              line = re.sub(r'INSERT INTO', 'INSERT OR REPLACE INTO', line, flags=re.IGNORECASE)
              # 替换所有形式的 NULL（含括号边界）
              line = re.sub(r'\bNULL\b', f"'{current_time}'", line)
              fixed.append(line)
              count += 1

          open('./restore_target.sql', 'w').writelines(fixed)
          print(f"处理完成，共 {count} 条记录")
          PYEOF

          echo "📄 message 表记录数: $(( $(wc -l < ./restore_target.sql) - 1 )) 行"
          echo "=== 替换后前3条 ==="
          head -4 ./restore_target.sql
      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Restore database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          echo "♻️ 正在恢复 message 表: $DB_NAME"
          wrangler d1 execute "$DB_NAME" --remote --file ./restore_target.sql
          echo "✅ message 表恢复完成"
