name: ♻️ Restore D1 Database
on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
      tables:
        description: '要恢复的表（逗号分隔，留空则恢复全部）示例: message,email'
        required: false
        type: string
        default: ''
permissions:
  actions: read
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份文件大小: $(du -sh backup.sql | cut -f1)"
      - name: Prepare restore file
        run: |
          python3 - <<'PYEOF'
          import re, uuid, os

          tables_input = os.environ.get('TABLES', '').strip()
          target_tables = [t.strip().strip('"') for t in tables_input.split(',') if t.strip()] if tables_input else []

          content = open('./backup.sql', encoding='utf-8', errors='replace').read()

          # 按语句分割
          statements = re.split(r';\s*\n', content)

          fixed = [f'-- restore-id: {uuid.uuid4()}\n']
          counts = {}

          for stmt in statements:
              stmt = stmt.strip()
              if not stmt:
                  continue

              # 只处理 INSERT 语句
              m = re.match(r'INSERT INTO\s+"?(\w+)"?\s', stmt, re.IGNORECASE)
              if not m:
                  continue

              table_name = m.group(1)

              # 如果指定了表，则只处理指定的表
              if target_tables and table_name not in target_tables:
                  continue

              # 跳过系统表
              if table_name in ('d1_migrations', 'sqlite_sequence', '_cf_KV'):
                  continue

              stmt = re.sub(r'^INSERT INTO', 'INSERT OR REPLACE INTO', stmt, flags=re.IGNORECASE)

              # message 表：补 sent_at 列（兼容旧备份）
              if table_name == 'message' and '"sent_at"' not in stmt:
                  stmt = re.sub(r'("html")\s*\)', r'\1,"sent_at")', stmt)
                  received_at_match = re.search(r',(\d{13}),', stmt)
                  if received_at_match:
                      stmt = re.sub(r'\)\s*$', f',{received_at_match.group(1)})', stmt)

              fixed.append(stmt + ';\n')
              counts[table_name] = counts.get(table_name, 0) + 1

          open('./restore_target.sql', 'w', encoding='utf-8').writelines(fixed)

          print(f"恢复范围: {'全部表' if not target_tables else ', '.join(target_tables)}")
          for t, c in sorted(counts.items()):
              print(f"  {t}: {c} 条")
          print(f"合计: {sum(counts.values())} 条")
          PYEOF
        env:
          TABLES: ${{ inputs.tables }}

      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Restore database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          echo "♻️ 正在恢复数据库: $DB_NAME"
          wrangler d1 execute "$DB_NAME" --remote --file ./restore_target.sql
          echo "✅ 恢复完成"
