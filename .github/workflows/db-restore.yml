name: ♻️ Restore D1 Database
on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: '备份任务的 Run ID（在备份 workflow 的 Summary 页查看）'
        required: true
        type: string
      tables:
        description: '要恢复的表（逗号分隔，留空则恢复全部）示例: message,email'
        required: false
        type: string
        default: ''
      batch_size:
        description: '每批导入的语句数（默认500，超时可调小）'
        required: false
        type: string
        default: '500'
permissions:
  actions: read
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: d1-backup
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Decompress backup
        run: |
          gunzip ./backup.sql.gz
          echo "📄 备份文件大小: $(du -sh backup.sql | cut -f1)"
      - name: Prepare restore files
        env:
          TABLES: ${{ inputs.tables }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          python3 - <<'PYEOF'
          import re, uuid, os, math, time

          tables_input = os.environ.get('TABLES', '').strip()
          target_tables = [t.strip().strip('"') for t in tables_input.split(',') if t.strip()] if tables_input else []
          batch_size = int(os.environ.get('BATCH_SIZE', '500'))

          # D1 单条语句上限约 1MB
          MAX_STMT_BYTES = 900_000

          content = open('./backup.sql', encoding='utf-8', errors='replace').read()
          statements = re.split(r';\s*\n', content)

          all_stmts = []
          counts = {}
          skipped = 0
          fallback_ts = int(time.time() * 1000)

          for stmt in statements:
              stmt = stmt.strip()
              if not stmt:
                  continue
              m = re.match(r'INSERT INTO\s+"?(\w+)"?\s', stmt, re.IGNORECASE)
              if not m:
                  continue
              table_name = m.group(1)
              if target_tables and table_name not in target_tables:
                  continue
              if table_name in ('d1_migrations', 'sqlite_sequence', '_cf_KV'):
                  continue

              stmt = re.sub(r'^INSERT INTO', 'INSERT OR REPLACE INTO', stmt, flags=re.IGNORECASE)

              if table_name == 'message':
                  if '"sent_at"' not in stmt:
                      stmt = re.sub(r'\)\s*VALUES', ',"sent_at") VALUES', stmt, count=1)
                      received_at_match = re.search(r',(\d{13})[,)]', stmt)
                      fill_val = received_at_match.group(1) if received_at_match else str(fallback_ts)
                      stmt = re.sub(r'\)\s*$', f',{fill_val})', stmt.rstrip())
                  else:
                      received_at_match = re.search(r',(\d{13})[,)]', stmt)
                      fill_val = received_at_match.group(1) if received_at_match else str(fallback_ts)
                      stmt = re.sub(r'\bNULL\b', fill_val, stmt)

              # 跳过超长语句（D1 限制）
              if len(stmt.encode('utf-8')) > MAX_STMT_BYTES:
                  skipped += 1
                  print(f"⚠️  跳过超长记录 ({len(stmt.encode('utf-8'))//1024}KB): {table_name}")
                  continue

              all_stmts.append(stmt + ';\n')
              counts[table_name] = counts.get(table_name, 0) + 1

          total = len(all_stmts)
          num_batches = math.ceil(total / batch_size) if total else 0
          os.makedirs('./batches', exist_ok=True)

          for i in range(num_batches):
              chunk = all_stmts[i*batch_size:(i+1)*batch_size]
              batch_file = f'./batches/batch_{i+1:04d}.sql'
              with open(batch_file, 'w', encoding='utf-8') as f:
                  f.write(f'-- restore-id: {uuid.uuid4()} batch {i+1}/{num_batches}\n')
                  f.writelines(chunk)

          print(f"恢复范围: {'全部表' if not target_tables else ', '.join(target_tables)}")
          for t, c in sorted(counts.items()):
              print(f"  {t}: {c} 条")
          print(f"合计: {total} 条，分 {num_batches} 批（每批 {batch_size} 条）")
          if skipped:
              print(f"⚠️  跳过超长记录: {skipped} 条（邮件 HTML 内容超过 D1 限制）")
          PYEOF

      - name: Install Wrangler
        run: npm install -g wrangler@4
      - name: Restore database in batches
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="${{ secrets.DATABASE_NAME }}"
          DB_NAME="${DB_NAME:-mail}"
          TOTAL=$(ls ./batches/batch_*.sql | wc -l)
          echo "♻️ 开始恢复数据库: $DB_NAME，共 $TOTAL 批"

          i=0
          for batch_file in $(ls ./batches/batch_*.sql | sort); do
            i=$((i+1))
            echo "📦 正在导入第 $i/$TOTAL 批: $batch_file"
            wrangler d1 execute "$DB_NAME" --remote --file "$batch_file"
            echo "✅ 第 $i 批完成"
          done

          echo "🎉 全部恢复完成"
